services:
  - type: web
    name: sentinelscope
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.10
      - key: VT_API_KEY
        sync: false
      - key: URLSCAN_KEY
        sync: false
      - key: GROQ_KEY
        sync: false
